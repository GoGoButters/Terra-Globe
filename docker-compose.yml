services:
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: terra-globe-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-terraglobe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_dev_password_123}
      POSTGRES_DB: ${POSTGRES_DB:-terraglobe}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-terraglobe} -d ${POSTGRES_DB:-terraglobe}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - terra-globe-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: terra-globe-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme_redis_password}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis_password}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - terra-globe-net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: terra-globe-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-terraglobe}:${POSTGRES_PASSWORD:-changeme_dev_password_123}@db:5432/${POSTGRES_DB:-terraglobe}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme_redis_password}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-changeme_generate_a_long_random_secret_key_here}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-your-google-client-id.apps.googleusercontent.com}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-your-google-client-secret}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:${NGINX_PORT:-80}/api/auth/google/callback}
      CESIUM_ION_TOKEN: ${CESIUM_ION_TOKEN:-your-cesium-ion-token-here}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:${NGINX_PORT:-80}}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - terra-globe-net
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: terra-globe-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - terra-globe-net
    restart: unless-stopped

volumes:
  pgdata:
  redis-data:

networks:
  terra-globe-net:
    driver: bridge
